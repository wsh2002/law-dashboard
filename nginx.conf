server {
    listen 80;
    server_name _;  # 改成你的域名，如 data.example.com

    root /var/www/law-dashboard/dist;
    index index.html;

    # ---- 静态资源：长缓存（Vite 带 hash 文件名）----
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- SPA 路由回退 ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- API 代理（替代 Vite dev server proxy）----
    # 智谱 GLM
    location /api/zhipu/ {
        proxy_pass https://open.bigmodel.cn/api/paas/v4/;
        proxy_set_header Host open.bigmodel.cn;
        proxy_set_header Authorization "Bearer YOUR_ZHIPU_API_KEY";
        proxy_ssl_server_name on;
    }

    # DeepSeek
    location /api/deepseek/ {
        proxy_pass https://api.deepseek.com/;
        proxy_set_header Host api.deepseek.com;
        proxy_set_header Authorization "Bearer YOUR_DEEPSEEK_API_KEY";
        proxy_ssl_server_name on;
    }

    # 豆包（火山方舟）
    location /api/doubao/ {
        proxy_pass https://ark.cn-beijing.volces.com/api/v3/;
        proxy_set_header Host ark.cn-beijing.volces.com;
        proxy_set_header Authorization "Bearer YOUR_DOUBAO_API_KEY";
        proxy_ssl_server_name on;
    }

    # 通义千问（DashScope）
    location /api/qwen/ {
        proxy_pass https://dashscope.aliyuncs.com/compatible-mode/v1/;
        proxy_set_header Host dashscope.aliyuncs.com;
        proxy_set_header Authorization "Bearer YOUR_DASHSCOPE_API_KEY";
        proxy_ssl_server_name on;
    }

    # 抖音数据 API
    location /api/douyin/ {
        proxy_pass https://api.ake999.com/api/dsp/;
        proxy_set_header Host api.ake999.com;
        proxy_ssl_server_name on;
    }

    # ---- Gzip 压缩 ----
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ---- 上传大小限制（对应你的 200MB 文件上传提示）----
    client_max_body_size 200m;
}
